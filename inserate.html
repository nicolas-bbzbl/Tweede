        <aside>
            <h3>Filter</h3>

            <form action="">

                <div class="filter-group">
                    <label class="filter-title">Preis</label>
                    <div class="field-inputs">
                        <input type="number" placeholder="Min" class="field-input">
                        <input type="number" placeholder="Max" class="field-input">
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-title">Kategorie</label>
                    <div class="filter-options">
                        <label class="filter-checkbox-label">
                            <input type="checkbox" class="filter-checkbox">
                            <span>Elektronik</span>
                        </label>
                        <label class="filter-checkbox-label">
                            <input type="checkbox" class="filter-checkbox">
                            <span>Möbel</span>
                        </label>
                        <label class="filter-checkbox-label">
                            <input type="checkbox" class="filter-checkbox">
                            <span>Sonstiges</span>
                        </label>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="dropdown-select" class="filter-title">Sortierung</label>
                    <select class="dropdown-select" id="dropdown-select">
                        <option>Neueste</option>
                        <option>Älteste</option>
                        <option>Preis: Niedrig zu Hoch</option>
                        <option>Preis: Hoch zu Niedrig</option>
                    </select>
                </div>

                <div class="filter-btn-parent">
                    <button class="filter-btn filter-reset" type="reset">Filter zurücksetzen</button>
                    <button class="filter-btn filter-apply" type="submit">Filter anwenden</button>
                </div>

            </form>
