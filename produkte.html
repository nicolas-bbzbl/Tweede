<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Finde alles was du brauchst auf Tweede!">
    <meta name="author" content="Nicolas Joss">
    <link rel="icon" type="image/x-icon" href="assets/images/branding/TweedeFavicon3.png">

    <title>Tweede - Alles was du brauchst</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <header>
        <a href="index.html"><img src="assets/images/branding/Tweede3.png" alt="logo" class="logo"></a>
        <nav class="page-selector">
            <ul>
                <li><a href="index.html" class="">Vorschläge</a></li>
                <li><a href="produkte.html" class="sel-under">Produkte</a></li>
                <li><a href="inserate.html" class="">Inserate</a></li>
            </ul>
        </nav>
        <input type="search" placeholder="What are you looking for?" id="searchbar" class="searchbar" required>
        <a href="erstellen.html"><button class="mainbutton btn2" id="create">+ Inserat erstellen</button></a>
    </header>

    <main>
        <section class="cat-filter-sec">

            <label class="filter-tag"><input type="checkbox" name="category" value="electronics" class="tag-checkbox">
                <span class="tag-text">Haushalt</span><span class="remove-x">&times;</span>
            </label>
            <label class="filter-tag"><input type="checkbox" name="category" value="electronics" class="tag-checkbox">
                <span class="tag-text">Instrumente</span><span class="remove-x">&times;</span>
            </label>
            <label class="filter-tag"><input type="checkbox" name="category" value="electronics" class="tag-checkbox">
                <span class="tag-text">Kleidung</span><span class="remove-x">&times;</span>
            </label>
            <label class="filter-tag"><input type="checkbox" name="category" value="electronics" class="tag-checkbox">
                <span class="tag-text">Fahrzeuge</span><span class="remove-x">&times;</span>
            </label>
            <label class="filter-tag"><input type="checkbox" name="category" value="electronics" class="tag-checkbox">
                <span class="tag-text">Gutscheine</span><span class="remove-x">&times;</span>
            </label>

        </section>
        <section class="prd-grid">
            <div class="prd-card">
                <img src="assets/images/products/1.webp" alt="Bild des Produktes" class="prd-image">
                <div class="prd-info">
                    <div class="prd-text">Produktname<em>2 Inserate</em></div>
                    <svg viewBox="0 0 12 12" width="20" height="20" fill="none" stroke="#4a4a4a" stroke-width="1px"
                        stroke-linejoin="round">
                        <polygon points="6,1 7,5 11,5 8,7 9,11 6,8 3,11 4,7 1,5 5,5" />
                    </svg>
                </div>
            </div>
            <div class="prd-card">
                <img src="assets/images/products/2.webp" alt="Bild des Produktes" class="prd-image">
                <div class="prd-info">
                    <div class="prd-text">Produktname<em>12 Inserate</em></div>
                    <svg viewBox="0 0 12 12" width="20" height="20" fill="none" stroke="#4a4a4a" stroke-width="1px"
                        stroke-linejoin="round">
                        <polygon points="6,1 7,5 11,5 8,7 9,11 6,8 3,11 4,7 1,5 5,5" />
                    </svg>
                </div>
            </div>
            <div class="prd-card">
                <img src="assets/images/products/3.webp" alt="Bild des Produktes" class="prd-image">
                <div class="prd-info">
                    <div class="prd-text">Produktname<em>4 Inserate</em></div>
                    <svg viewBox="0 0 12 12" width="20" height="20" fill="none" stroke="#4a4a4a" stroke-width="1px"
                        stroke-linejoin="round">
                        <polygon points="6,1 7,5 11,5 8,7 9,11 6,8 3,11 4,7 1,5 5,5" />
                    </svg>
                </div>
            </div>
            <div class="prd-card">
                <img src="assets/images/products/4.webp" alt="Bild des Produktes" class="prd-image">
                <div class="prd-info">
                    <div class="prd-text">Produktname<em>4 Inserate</em></div>
                    <svg viewBox="0 0 12 12" width="20" height="20" fill="none" stroke="#4a4a4a" stroke-width="1px"
                        stroke-linejoin="round">
                        <polygon points="6,1 7,5 11,5 8,7 9,11 6,8 3,11 4,7 1,5 5,5" />
                    </svg>
                </div>
            </div>
        </section>
    </main>

    <footer>
        Tweede © 2026 Nicolas Joss
    </footer>
</body>

</html>
